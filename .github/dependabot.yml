version: 2
updates:
  # npm dependencies
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      # Batch routine minor/patch bumps into a single PR to reduce noise.
      npm-minor-patch:
        update-types:
          - minor
          - patch
      # Keep the React packages together.
      react:
        patterns:
          - react
          - react-dom
          - "@types/react"
          - "@types/react-dom"

  # GitHub Actions used in workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions
    groups:
      actions:
        patterns:
          - "*"
